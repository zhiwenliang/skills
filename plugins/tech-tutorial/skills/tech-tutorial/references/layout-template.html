<!DOCTYPE html>
<!--
  ════════════════════════════════════════════════════════════════
  tech-tutorial · HTML layout template
  ════════════════════════════════════════════════════════════════

  Aesthetic: minimalist monochrome + single vermillion accent
    - White background, neutral grays, single warm-red accent.
    - Sans-serif body (Noto Sans SC) for information density.
    - No textures, no decorative numerals, no rainbow callouts.
    - Vermillion is used sparingly: warning callout, current
      breadcrumb, code keywords, selected table row, link hover,
      challenge & predict labels.

  Tech stack:
    - Google Fonts: Noto Sans SC + JetBrains Mono only
    - Prism.js (CDN) for syntax highlighting — custom theme overrides palette
    - Zero CSS framework, zero JS framework, no build step

  How to use:
    1. Copy this entire file as the starting point for each chapter
       (index.html, 01-concepts.html, 02-principles.html, etc.)
    2. Update <title>
    3. Update the .learning-path breadcrumb (mark current chapter with .current)
    4. Fill in <article> with chapter content using the reusable HTML
       snippets defined in references/tutorial_template.md
    5. Update sticky TOC links (aside.toc-sidebar > ul) to match in-article anchors
    6. Update prev/next nav at bottom

  Class names you'll use (full reference in tutorial_template.md):
    .learning-path   .chapter-opener (now uses .chapter-label, not .numeral)
    .schema-panel   .one-liner   .rationale   .annotations
    .code-block (with .header > .filename .lang .copy)
    .callout (.warning .tip .example .insight — only .warning shows accent)
    .compare-table (tr.selected)
    figure > svg > figcaption (figcaption > .fig-num)
    .predict   details > summary
    .self-check   .challenge   .references   .chapter-nav
  ════════════════════════════════════════════════════════════════
-->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{CHAPTER TITLE}} · {{TECH NAME}} 教程</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">

<style>
/* ============================================================
   tech-tutorial design system v2 (minimalist mono + accent)
   ============================================================ */

:root {
  /* Color — neutral palette; vermillion is the sole accent */
  --bg:          #FFFFFF;
  --bg-soft:     #FAFAFA;    /* code & callout subtle bg */
  --bg-edge:     #F4F4F4;    /* code header */
  --ink:         #0A0A0A;
  --ink-soft:    #525252;
  --ink-faint:   #A3A3A3;
  --rule:        #E5E5E5;
  --vermilion:   #B73B2F;    /* the only accent — used sparingly */
  --vermilion-soft: rgba(183,59,47,0.06);

  /* Code token colors — muted, restricted palette */
  --code-string: #2D6A4F;    /* muted green */
  --code-number: #8B6914;    /* muted amber */
  --code-fn:     #2C3E50;    /* muted blue */

  /* Typography */
  --sans:        'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
  --mono:        'JetBrains Mono', 'SF Mono', 'Menlo', monospace;

  /* Rhythm */
  --measure:     880px;       /* main reading column */
  --page-max:    1280px;      /* page outer max */
  --line:        1.6;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15.5px;
  line-height: var(--line);
  font-feature-settings: "kern", "liga";
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

main { position: relative; }

.progress-bar {
  position: fixed; top: 0; left: 0; height: 2px;
  width: 0; background: var(--vermilion);
  z-index: 100; transition: width 80ms linear;
}

/* Learning path breadcrumb at top */
.learning-path {
  max-width: var(--page-max);
  margin: 0 auto;
  padding: 16px 40px 0;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--ink-faint);
}
.learning-path a {
  color: var(--ink-faint);
  text-decoration: none;
  padding: 2px 0; margin: 0 4px;
}
.learning-path a:first-child { margin-left: 0; }
.learning-path .sep { color: var(--ink-faint); margin: 0 2px; user-select: none; }
.learning-path .current {
  color: var(--vermilion);
  font-weight: 700;
}

/* Page layout: article + sticky TOC */
.page {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 200px;
  gap: 48px;
  max-width: var(--page-max);
  margin: 0 auto;
  padding: 24px 40px 80px;
}
@media (max-width: 1080px) {
  .page { grid-template-columns: 1fr; gap: 0; padding: 16px 24px 64px; }
  .toc-sidebar { display: none; }
}

article { max-width: var(--measure); min-width: 0; }

/* Chapter opener */
.chapter-opener {
  padding: 24px 0 16px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 24px;
}
.chapter-opener .chapter-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin: 0 0 8px;
  font-weight: 500;
}
.chapter-opener h1 {
  font-family: var(--sans);
  font-weight: 700;
  font-size: 30px;
  line-height: 1.2;
  margin: 0 0 12px;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.chapter-opener .recap {
  font-size: 14px;
  color: var(--ink-soft);
  margin: 0;
  max-width: 640px;
}
@media (max-width: 640px) {
  .chapter-opener h1 { font-size: 24px; }
}

/* Schema panel */
.schema-panel {
  border-left: 2px solid var(--ink);
  padding: 4px 0 4px 16px;
  margin: 16px 0 32px;
}
.schema-panel .label {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-soft);
  margin: 0 0 8px;
  font-weight: 500;
}
.schema-panel ul { list-style: none; padding: 0; margin: 0; }
.schema-panel li {
  padding: 4px 0;
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--ink);
}
.schema-panel li::before { content: "—  "; color: var(--ink-faint); }

/* Body prose */
article p, article li {
  font-size: 15.5px; line-height: var(--line);
  color: var(--ink);
  margin: 0.9em 0;
}
article strong { font-weight: 600; color: var(--ink); }
article em { font-style: italic; color: var(--ink); }

article :not(pre) > code {
  font-family: var(--mono);
  font-size: 0.88em;
  background: var(--bg-soft);
  padding: 1px 5px;
  border-radius: 2px;
  color: var(--vermilion);
  border: 1px solid var(--rule);
}

article a {
  color: var(--ink);
  text-decoration: underline;
  text-decoration-color: var(--ink-faint);
  text-underline-offset: 2px;
  text-decoration-thickness: 1px;
  transition: color 150ms, text-decoration-color 150ms;
}
article a:hover { color: var(--vermilion); text-decoration-color: var(--vermilion); }

/* Section headings */
article h2 {
  font-family: var(--sans);
  font-weight: 700;
  font-size: 22px; line-height: 1.3;
  margin: 36px 0 8px;
  padding-top: 16px;
  border-top: 1px solid var(--rule);
  letter-spacing: -0.005em;
}
article h2 .num {
  font-family: var(--mono);
  font-weight: 500;
  font-size: 15px;
  color: var(--ink-faint);
  margin-right: 10px;
}

article h3 {
  font-family: var(--sans);
  font-weight: 600;
  font-size: 16px;
  margin: 20px 0 8px;
  color: var(--ink);
}

/* One-liner definition */
article .one-liner {
  font-size: 16px; line-height: 1.55;
  color: var(--ink);
  font-weight: 500;
  margin: 8px 0 18px;
  padding-left: 12px;
  border-left: 2px solid var(--ink-faint);
}

/* "为什么需要它" rationale block */
article .rationale {
  background: var(--bg-soft);
  padding: 12px 16px;
  border-left: 2px solid var(--ink-soft);
  margin: 16px 0;
  font-size: 14.5px;
}
article .rationale > .label {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-soft);
  font-weight: 500;
  margin-bottom: 4px;
  display: block;
}
article .rationale p { margin: 4px 0; }

/* Code block */
.code-block {
  margin: 16px 0;
  border: 1px solid var(--rule);
  border-radius: 3px;
  overflow: hidden;
  background: var(--bg-soft);
}
.code-block .header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px;
  background: var(--bg-edge);
  border-bottom: 1px solid var(--rule);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
}
.code-block .header .filename { font-weight: 500; }
.code-block .header .lang { color: var(--ink-faint); text-transform: uppercase; font-weight: 500; font-size: 10px; }
.code-block .header .copy {
  border: none; background: transparent;
  font-family: var(--mono); font-size: 10px;
  color: var(--ink-soft); cursor: pointer;
  padding: 2px 6px; letter-spacing: 0.05em; text-transform: uppercase;
  transition: color 150ms;
}
.code-block .header .copy:hover { color: var(--vermilion); }
.code-block .header .copy.copied { color: var(--vermilion); }
.code-block pre {
  margin: 0; padding: 14px 16px;
  overflow-x: auto;
  font-family: var(--mono);
  font-size: 13px; line-height: 1.6;
  color: var(--ink);
  background: var(--bg-soft);
}
.code-block pre code { background: none; padding: 0; color: inherit; border: none; font-weight: 400; }

/* Prism theme — restrained palette: 4 token colors + neutrals */
.token.keyword,
.token.boolean,
.token.constant     { color: var(--vermilion); font-weight: 500; }
.token.string,
.token.char         { color: var(--code-string); }
.token.number       { color: var(--code-number); }
.token.comment,
.token.prolog,
.token.doctype,
.token.cdata        { color: var(--ink-faint); font-style: italic; }
.token.function     { color: var(--code-fn); font-weight: 500; }
.token.class-name   { color: var(--ink); font-weight: 700; }
.token.operator,
.token.punctuation  { color: var(--ink-soft); }
.token.builtin      { color: var(--vermilion); }
.token.property     { color: var(--ink); }
.token.tag,
.token.attr-name    { color: var(--code-fn); }
.token.attr-value   { color: var(--code-string); }

/* Annotations after code (line-ref pills) */
.annotations { margin: 10px 0 18px; font-size: 14px; color: var(--ink-soft); }
.annotations .line-ref {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--bg-soft);
  border: 1px solid var(--rule);
  padding: 1px 6px;
  border-radius: 2px;
  margin-right: 4px;
  color: var(--vermilion);
  font-weight: 500;
}

/* Predictive question block */
.predict {
  margin: 16px 0;
  padding: 12px 16px;
  background: var(--bg-soft);
  border-left: 2px solid var(--vermilion);
  border-radius: 2px;
}
.predict > .question-label {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--vermilion);
  font-weight: 500;
  margin: 0 0 4px;
  display: block;
}
.predict p { margin: 4px 0; color: var(--ink); }

/* <details> answer reveal */
details {
  margin: 10px 0 0;
  border-top: 1px dashed var(--rule);
  padding-top: 10px;
}
details > summary {
  cursor: pointer; list-style: none;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: 0.04em;
  padding: 4px 0;
  transition: color 150ms;
  user-select: none;
  display: flex; align-items: center; gap: 6px;
}
details > summary::-webkit-details-marker { display: none; }
details > summary::before {
  content: "▸";
  display: inline-block;
  color: var(--ink-faint);
  transition: transform 200ms, color 150ms;
  font-size: 9px;
}
details[open] > summary::before { transform: rotate(90deg); color: var(--vermilion); }
details > summary:hover { color: var(--vermilion); }
details > summary:hover::before { color: var(--vermilion); }
details > *:not(summary) {
  margin-top: 8px;
  padding-left: 14px;
  border-left: 1px solid var(--rule);
}

/* Callouts — neutral by default; only .warning shows accent */
.callout {
  margin: 16px 0;
  padding: 10px 16px;
  border-left: 2px solid var(--ink-soft);
  background: var(--bg-soft);
  font-size: 14.5px;
}
.callout .label {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: 700;
  color: var(--ink-soft);
  margin: 0 0 4px;
  display: block;
}
.callout p { margin: 4px 0; }
.callout.warning { border-left-color: var(--vermilion); background: var(--vermilion-soft); }
.callout.warning .label { color: var(--vermilion); }
/* tip / example / insight: keep semantic class for HTML clarity, render neutral */
.callout.tip     { border-left-color: var(--ink-soft); }
.callout.example { border-left-color: var(--ink-soft); }
.callout.insight { border-left-color: var(--ink-soft); }

/* Comparison table */
.compare-table {
  margin: 20px 0;
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.compare-table caption {
  text-align: left;
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-soft);
  padding: 0 0 8px;
  font-weight: 500;
}
.compare-table thead th {
  text-align: left;
  font-family: var(--sans);
  font-weight: 600; font-size: 13px;
  color: var(--ink);
  padding: 8px 10px;
  border-bottom: 1px solid var(--ink);
}
.compare-table tbody td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--rule);
  vertical-align: top;
  line-height: 1.5;
}
.compare-table tbody tr.selected td { font-weight: 500; }
.compare-table tbody tr.selected td:first-child {
  border-left: 2px solid var(--vermilion);
  padding-left: 8px;
  color: var(--vermilion);
  position: relative;
}

/* Figures (SVG diagrams) */
figure { margin: 24px 0; }
figure svg { display: block; margin: 0 auto; max-width: 100%; height: auto; }
figcaption {
  font-family: var(--sans);
  font-size: 13px;
  color: var(--ink-soft);
  text-align: center;
  margin-top: 10px;
  line-height: 1.5;
}
figcaption .fig-num {
  font-family: var(--mono);
  font-weight: 600;
  color: var(--vermilion);
  margin-right: 6px;
  font-size: 11px;
  letter-spacing: 0.04em;
}

/* Self-check block */
.self-check {
  margin: 32px 0 20px;
  border-top: 1px solid var(--ink);
  padding-top: 20px;
}
.self-check h2 { border: none; padding-top: 0; margin-top: 0; font-size: 18px; }
.self-check ol { padding-left: 22px; }
.self-check ol li { margin: 10px 0; padding-left: 4px; }
.self-check ol li::marker { font-family: var(--mono); color: var(--ink-faint); font-weight: 500; font-size: 13px; }

/* Advanced challenge */
.challenge {
  margin: 24px 0;
  padding: 14px 18px;
  background: var(--bg-soft);
  border-left: 2px solid var(--vermilion);
  border-radius: 2px;
}
.challenge .label {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  font-weight: 700;
  color: var(--vermilion);
  margin: 0 0 8px;
  display: block;
}
.challenge h3 { margin-top: 0; font-size: 15px; }

/* References + chapter nav */
.references { margin: 32px 0 16px; padding-top: 16px; border-top: 1px solid var(--rule); }
.references h3 {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-soft); font-weight: 500;
  margin: 0 0 8px;
}
.references ul { padding-left: 16px; }
.references li { font-size: 13.5px; line-height: 1.55; color: var(--ink-soft); }
.references li a { color: var(--ink); }

.chapter-nav {
  margin-top: 28px; padding-top: 16px;
  border-top: 1px solid var(--rule);
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.chapter-nav a {
  display: block; padding: 12px 14px;
  border: 1px solid var(--rule);
  text-decoration: none; color: var(--ink);
  transition: border-color 150ms;
}
.chapter-nav a:hover { border-color: var(--vermilion); }
.chapter-nav a.next { text-align: right; }
.chapter-nav .label {
  display: block; font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-faint); margin-bottom: 2px;
}
.chapter-nav .title { font-weight: 500; font-size: 14px; }

/* Sticky TOC sidebar */
.toc-sidebar {
  position: sticky; top: 24px;
  align-self: start;
  padding-top: 24px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.55;
  max-height: calc(100vh - 48px);
  overflow-y: auto;
}
.toc-sidebar .toc-label {
  font-family: var(--mono);
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-faint); font-weight: 500;
  margin: 0 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--rule);
}
.toc-sidebar ul { list-style: none; padding: 0; margin: 0; }
.toc-sidebar li { margin: 2px 0; }
.toc-sidebar a {
  display: block; padding: 3px 0 3px 10px;
  color: var(--ink-soft); text-decoration: none;
  border-left: 2px solid transparent;
  transition: all 150ms;
  font-size: 11px;
}
.toc-sidebar a:hover { color: var(--ink); }
.toc-sidebar a.active {
  color: var(--vermilion);
  border-left-color: var(--vermilion);
  font-weight: 500;
}

/* Subtle entrance — single fade, no staggered theatrics */
@media (prefers-reduced-motion: no-preference) {
  .chapter-opener { animation: fade-in 400ms cubic-bezier(0.2, 0.7, 0.3, 1) both; }
  .schema-panel   { animation: fade-in 400ms 100ms cubic-bezier(0.2, 0.7, 0.3, 1) both; }
}
@keyframes fade-in {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ============================================================
   SVG conventions — utility classes for hand-drawn diagrams
   (full规约 see references/diagram_guide.md)
   ============================================================ */
.diagram-ink       { stroke: var(--ink);       fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
.diagram-accent    { stroke: var(--vermilion); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
.diagram-soft      { stroke: var(--ink-faint); fill: none; stroke-width: 1.1; stroke-dasharray: 3 3; }
.node-fill         { fill: var(--bg); }
.node-fill-accent  { fill: var(--vermilion-soft); }
.node-label        { font-family: var(--sans); font-size: 13px; font-weight: 500; fill: var(--ink); }
.node-label-accent { font-family: var(--sans); font-size: 13px; font-weight: 700; fill: var(--vermilion); }
.edge-label        { font-family: var(--mono); font-size: 11px; fill: var(--ink-soft); paint-order: stroke; stroke: var(--bg); stroke-width: 4px; stroke-linejoin: round; }
.branch-label      { font-family: var(--mono); font-size: 11px; font-weight: 700; fill: var(--vermilion); paint-order: stroke; stroke: var(--bg); stroke-width: 4px; stroke-linejoin: round; }

/* ============================================================
   Multi-tutorial library: hub index + 相关教程 cross-links
   (see SKILL.md "Building a knowledge library")
   ============================================================ */
.theme-cluster          { margin: 2.4rem 0; }
.theme-cluster > h2     { margin-bottom: 1rem; }
.tutorial-cards         { list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.75rem; }
.tutorial-cards > li    { border: 1px solid var(--ink-faint); border-left: 3px solid var(--ink); border-radius: 4px; padding: 0.7rem 0.9rem; transition: border-color .15s ease; }
.tutorial-cards > li:hover { border-left-color: var(--vermilion); }
.tutorial-cards a       { text-decoration: none; }
.tutorial-cards .schema { display: block; margin-top: 0.3rem; font-size: 13px; color: var(--ink-soft); line-height: 1.45; }
.related-tutorials      { margin-top: 2.6rem; padding-top: 1.4rem; border-top: 1px solid var(--ink-faint); }
.related-tutorials .label { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft); margin: 0.9rem 0 0.3rem; }
.related-tutorials ul   { margin: 0.2rem 0 0.6rem; }
</style>
</head>
<body>

<div class="progress-bar" id="progress"></div>

<main>
  <!--
    Learning path breadcrumb. Mark the current chapter with class="current".
    Replace links with relative paths to your tutorial's chapters.
  -->
  <nav class="learning-path" aria-label="学习路径">
    <!-- Default: concept-focused (4 chapters) -->
    <a href="index.html">00 起点</a><span class="sep">—</span>
    <a href="01-concepts.html" class="current">01 概念</a><span class="sep">—</span>
    <a href="02-principles.html">02 原理</a><span class="sep">—</span>
    <a href="03-self-check.html">03 自测</a>
    <!-- Hands-on extension: replace the line above (03 自测) with:
    <a href="03-practice.html">03 实操</a><span class="sep">—</span>
    <a href="04-pitfalls.html">04 陷阱</a><span class="sep">—</span>
    <a href="05-capstone.html">05 综合</a><span class="sep">—</span>

<!-- Prism syntax highlighter — autoloader fetches grammar files on demand -->
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

<script>
/* Three small interactions:
   1. Scroll progress bar (top, 2px vermilion)
   2. TOC active-section via IntersectionObserver
   3. Copy-to-clipboard for code blocks
*/

// 1. Progress bar
const progress = document.getElementById('progress');
function updateProgress() {
  const h = document.documentElement;
  const max = h.scrollHeight - h.clientHeight;
  const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;
  progress.style.width = pct + '%';
}
window.addEventListener('scroll', updateProgress, { passive: true });
window.addEventListener('resize', updateProgress);
updateProgress();

// 2. TOC active section highlight
const tocLinks = document.querySelectorAll('.toc-sidebar a[data-toc-target]');
const tocByCid = new Map();
tocLinks.forEach(a => tocByCid.set(a.dataset.tocTarget, a));
const sectionEls = Array.from(tocByCid.keys())
  .map(id => document.getElementById(id))
  .filter(Boolean);

const obs = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const link = tocByCid.get(entry.target.id);
    if (!link) return;
    if (entry.isIntersecting) {
      tocLinks.forEach(a => a.classList.remove('active'));
      link.classList.add('active');
    }
  });
}, { rootMargin: '-30% 0px -60% 0px', threshold: 0 });
sectionEls.forEach(el => obs.observe(el));

// 3. Copy code button
document.querySelectorAll('.code-block .copy').forEach(btn => {
  btn.addEventListener('click', async () => {
    const targetId = btn.dataset.copyTarget;
    const el = document.getElementById(targetId);
    if (!el) return;
    try {
      await navigator.clipboard.writeText(el.innerText);
      const original = btn.textContent;
      btn.textContent = '已复制';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = original;
        btn.classList.remove('copied');
      }, 1400);
    } catch (e) {
      btn.textContent = '失败';
      setTimeout(() => { btn.textContent = '复制'; }, 1400);
    }
  });
});
</script>
