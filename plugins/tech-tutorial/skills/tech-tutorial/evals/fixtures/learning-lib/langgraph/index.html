  <header><h1>LangGraph</h1></header>
  <section><h2>适合谁</h2><p>用过 LangChain，需要带循环/分支的有状态 agent 控制流。</p></section>
  <section><h2>不适合谁</h2><p>只需要线性链、不涉及状态机的读者。</p></section>
  <section class="schema-panel"><p class="label">一句话本质</p>
    <p>LangGraph 把 agent 的控制流建模成有状态的图：节点是步骤，边是转移，状态在图上流动，因此天然支持循环与回溯。</p></section>
